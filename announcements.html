<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>AppChurch Announcements</title>
<meta name="description" content="AppChurch Events and Announcements.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
/* === TOKENS === */
:root {
  --navy: #1A2B5A; --navy-dk: #0F1C40; --navy-pale: #EEF1FA;
  --crimson: #8B1A28; --gold: #B8913A; --gold-lt: #D4AD62; --gold-pale: #FBF6EC;
  --bg: #FFFDF7; --bg-w: #FFFFFF; --bg-warm: #FBF4E6;
  --dark: #221A0A; --text: #1A1E2E; --text-mid: #454D6A; --text-dim: #8892B0;
  --border-gold: rgba(184,145,58,.28);
  --sh-md: 0 4px 20px rgba(184,145,58,.14);
  --r: 12px; --r-lg: 20px; --r-xl: 28px;
  --fs: 'Plus Jakarta Sans', system-ui, sans-serif;
  --ff: 'Fraunces', Georgia, serif;
  --tr: .25s cubic-bezier(.4, 0, .2, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--fs);line-height:1.65;padding:2rem 1.2rem;}
.container { max-width: 800px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 3rem; }
.logo { height: 48px; margin-bottom: 1rem; border-radius: 50%; }
.eyebrow{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.sec-title{font-family:var(--ff);font-size:2rem;font-weight:600;color:var(--text);margin-bottom:.75rem}
.sec-title span{color:var(--gold)}
.divider{width:44px;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:3px;margin:.75rem auto 1.1rem}
.btn {display:inline-flex;align-items:center;padding:.68rem 1.35rem;border-radius:100px;font-size:.88rem;font-weight:600;background:var(--gold);color:#fff;text-decoration:none;transition:transform var(--tr);margin-bottom: 2rem;}
.btn:hover{transform:translateY(-2px);background:#9A7A2E;}

.ann-card { background:#fff; border:1px solid var(--border-gold); border-top: 4px solid var(--gold); border-radius:var(--r-lg); padding:2rem; margin-bottom:1.5rem; box-shadow:var(--sh-md); }
.ann-img { width:100%; max-height: 360px; object-fit: cover; border-radius: var(--r); margin-bottom: 1.5rem; background: var(--bg-warm); }
.ann-date { font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); margin-bottom:.5rem; }
.ann-title { font-family:var(--ff); font-size:1.4rem; font-weight:600; color:var(--navy); margin-bottom:.75rem; }
.ann-body { font-size:.95rem; color:var(--text-mid); white-space: pre-wrap; line-height: 1.8; }
.ann-tag { display:inline-block; margin-top:1rem; padding:.22rem .8rem; border-radius:100px; font-size:.7rem; font-weight:600; background:var(--gold-pale); color:var(--gold); }
.loading { text-align: center; color: var(--text-dim); font-style: italic; margin-top: 3rem; }
</style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="btn">← Back to Home</a>
    <div class="header">
      <img src="img/appchurch round logo.png" alt="AppChurch" class="logo">
      <div><span class="eyebrow">Stay up to Date</span></div>
      <div class="divider"></div>
      <h1 class="sec-title">AppChurch <span>Announcements</span></h1>
    </div>

    <div id="ann-container">
      <div class="loading">Loading announcements...</div>
    </div>
  </div>

  <script>
    async function init() {
      const container = document.getElementById('ann-container');
      let data = [];

      // Try reading from index.html directly by fetching it
      try {
        const res = await fetch('index.html');
        if (res.ok) {
          const html = await res.text();
          const match = html.match(/const ANNOUNCEMENT_DATA\s*=\s*(\[.*?\]);/s);
          if (match && match[1]) {
            data = JSON.parse(match[1]);
          }
        }
      } catch (err) {
        console.error("Failed to fetch index.html", err);
      }

      // Fallback
      if (!data.length) {
        try { data = JSON.parse(localStorage.getItem('appchurch_announcements')) || []; } catch(e) {}
      }

      if (!data.length) {
        container.innerHTML = '<div class="loading">Currently no active announcements. Check back later!</div>';
        return;
      }

      container.innerHTML = data.map(a => `
        <div class="ann-card">
          ${a.image ? `<img src="${a.image}" alt="${a.title}" class="ann-img">` : ''}
          <div class="ann-date">${a.date ? new Date(a.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : ''}</div>
          <h2 class="ann-title">${a.title || 'Announcement'}</h2>
          <div class="ann-body">${a.body || ''}</div>
          ${a.tag ? `<span class="ann-tag">${a.tag}</span>` : ''}
        </div>
      `).join('');
    }
    init();
  </script>
</body>
</html>
