<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — AppChurch</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A2B5A;--gold:#B8913A;--bg:#FAFAF7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.wrap{max-width:440px}
.cross{font-size:3rem;margin-bottom:1rem;display:block;opacity:.35}
h1{font-family:'Fraunces',serif;font-size:2rem;color:var(--navy);margin-bottom:.75rem}
p{font-size:.95rem;color:#6B7594;line-height:1.7;margin-bottom:2rem}
a{display:inline-block;background:var(--gold);color:#fff;padding:.75rem 2rem;border-radius:100px;font-weight:600;font-size:.9rem;text-decoration:none;transition:opacity .2s}
a:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
  <span class="cross">✝</span>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or may have moved. Let's get you back to the community.</p>
  <a href="/">← Return to AppChurch</a>
</div>
</body>
</html>
