name: Good News Auto-Scan

# RSS-based crawler — no API key required. Runs daily 09:00 EST / 14:00 UTC.

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Good News scanner
        run: python3 scripts/scan_news.py

      - name: Commit and deploy
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "Good News Bot"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Good News scan $(date -u +%Y-%m-%d)"
            git push
            echo "Deployed."
          fi
